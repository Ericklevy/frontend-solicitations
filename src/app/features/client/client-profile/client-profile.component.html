
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 border-r border-outline-variant dark:border-outline-variant backdrop-blur-xl bg-surface-container dark:bg-surface-container shadow-md z-50 py-base">
    <div class="px-6 mb-8 mt-8 flex flex-col items-center justify-center w-full text-center border-b border-outline-variant/30 pb-6">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary tracking-tight">LuxeService</h1>
        <p class="text-[10px] text-on-surface-variant uppercase tracking-[0.2em] mt-1 font-bold">Client Portal</p>
    </div>
    
    <div class="flex-1 px-3 space-y-1 mt-4">
        <a routerLink="/cliente/painel" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant font-bold hover:bg-surface-variant/50 transition-colors cursor-pointer font-body-md text-body-md">
            <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
            <span>Painel</span>
        </a>
        <a routerLink="/cliente/nova-solicitacao" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant font-bold hover:bg-surface-variant/50 transition-colors cursor-pointer font-body-md text-body-md">
            <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
            <span>Nova Solicitação</span>
        </a>
        <a routerLink="/cliente/perfil" routerLinkActive="bg-primary/10 text-primary border-r-2 border-primary" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant font-bold hover:bg-surface-variant/50 transition-colors cursor-pointer font-body-md text-body-md">
            <span class="material-symbols-outlined" data-icon="person">person</span>
            <span>Meu Perfil</span>
        </a>
    </div>
    <div class="px-3 mt-auto space-y-4">
        <div class="space-y-1 pt-4 border-t border-outline-variant/30">
            <a href="/auth" class="cursor-pointer flex items-center gap-3 px-4 py-2 rounded-lg text-on-surface-variant hover:bg-surface-variant/50 transition-colors font-body-md text-body-md mt-1">
                <span class="material-symbols-outlined" data-icon="logout">logout</span>
                <span>Sair</span>
            </a>
        </div>
    </div>
</nav>

<header class="hidden md:flex fixed top-0 right-0 left-64 h-16 justify-between items-center px-margin-desktop z-40 bg-background/80 dark:bg-background/80 backdrop-blur-xl border-b border-outline-variant/30 transition-all font-label-md text-label-md text-primary dark:text-primary">
    <div class="flex items-center gap-4 w-full">
        <div class="flex-1"></div>
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-sm">person</span>
            </div>
        </div>
    </div>
</header>
<main class="md:pl-64 pt-16 min-h-screen">
    <div class="max-w-[1280px] mx-auto p-margin-mobile md:p-margin-desktop">
        <div class="mb-stack-sm">
            <h2 class="font-headline-lg text-headline-lg md:text-headline-lg text-on-surface mb-2">Meu Perfil</h2>
            <p class="font-body-lg text-body-lg text-on-surface-variant">Edite seus dados pessoais e preferências.</p>
        </div>
        <div class="glass-card rounded-xl p-6 ambient-glow max-w-xl">
        <div class="space-y-4" *ngIf="currentUser">
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Nome Completo</label>
                <input type="text" [value]="currentUser.name" class="w-full bg-surface-container p-3 rounded-lg text-on-surface border border-outline-variant/30 font-bold" readonly>
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">E-mail</label>
                <input type="text" [value]="currentUser.email" class="w-full bg-surface-container p-3 rounded-lg text-on-surface border border-outline-variant/30 font-bold" readonly>
            </div>
            <button class="primary-gradient-btn px-6 py-2 rounded-lg text-white font-bold mt-4 shadow-lg shadow-primary/20">Editar</button>
        </div>
    </div>
    </div>
</main>
