<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-margin-mobile md:px-margin-desktop py-stack-lg">
    <div class="mb-stack-lg flex flex-col items-center">
        <span class="material-symbols-outlined text-4xl text-primary mb-stack-sm" style="font-variation-settings: 'FILL' 1;">diamond</span>
        <h1 class="font-headline-md text-headline-md text-primary tracking-tight">LuxeService</h1>
    </div>
    
    <div class="glass-panel w-full max-w-[440px] rounded-2xl p-stack-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1/2 h-[1px] bg-gradient-to-r from-white/20 to-transparent"></div>
        <div class="absolute top-0 left-0 w-[1px] h-1/2 bg-gradient-to-b from-white/20 to-transparent"></div>
        
        <div class="flex bg-surface-container-low rounded-full p-1 mb-stack-lg border border-white/5 relative">
            <div class="absolute w-[calc(50%-4px)] h-[calc(100%-8px)] bg-primary-container/20 rounded-full top-1 left-1 transition-all duration-300 ease-in-out border border-primary/20 shadow-[0_0_10px_rgba(46,91,255,0.2)]" 
                 [ngStyle]="{'transform': currentFlow === 'login' ? 'translateX(100%)' : 'translateX(0)'}"></div>
            <button class="flex-1 py-2 text-center relative z-10 font-label-md text-label-md transition-colors duration-300"
                    [ngClass]="currentFlow === 'login' ? 'text-primary font-semibold' : 'text-on-surface-variant'"
                    (click)="switchTab('login')">
                Entrar
            </button>
            <button class="flex-1 py-2 text-center relative z-10 font-label-md text-label-md transition-colors duration-300"
                    [ngClass]="currentFlow === 'signup' ? 'text-primary font-semibold' : 'text-on-surface-variant'"
                    (click)="switchTab('signup')">
                Criar Conta
            </button>
        </div>
        
        <div *ngIf="errorMessage" class="mb-4 p-3 bg-error-container/30 border border-error/50 rounded-lg text-error font-body-md text-sm text-center">
            {{ errorMessage }}
        </div>

        <div class="relative min-h-[350px]">
            <!-- SIGNUP FLOW -->
            <div *ngIf="currentFlow === 'signup'" class="absolute w-full top-0 fade-in">
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-inverse-surface mb-stack-lg text-center">Começar Agora</h2>
                <form [formGroup]="signupForm" class="flex flex-col gap-stack-md" (ngSubmit)="onSignup()">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
                        <input formControlName="name" class="input-inset w-full rounded-lg py-3 pl-12 pr-4 text-on-surface outline-none placeholder:text-outline-variant font-body-md text-body-md" 
                               [class.border-error]="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
                               placeholder="Nome Completo" type="text"/>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                        <input formControlName="email" class="input-inset w-full rounded-lg py-3 pl-12 pr-4 text-on-surface outline-none placeholder:text-outline-variant font-body-md text-body-md" 
                               [class.border-error]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
                               placeholder="E-mail profissional" type="email"/>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
                        <input formControlName="password" class="input-inset w-full rounded-lg py-3 pl-12 pr-4 text-on-surface outline-none placeholder:text-outline-variant font-body-md text-body-md" 
                               [class.border-error]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
                               placeholder="Criar Senha" type="password"/>
                    </div>
                    <button [disabled]="signupForm.invalid || isLoading" class="glow-button mt-stack-sm w-full bg-primary text-on-primary-fixed font-label-md text-label-md py-4 rounded-full flex justify-center items-center gap-2 hover:bg-primary-fixed disabled:opacity-50 transition-all" type="submit">
                        <span *ngIf="!isLoading">Criar Minha Conta</span>
                        <span *ngIf="isLoading" class="material-symbols-outlined animate-spin">progress_activity</span>
                        <span *ngIf="!isLoading" class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </form>
                <p class="text-center font-label-sm text-label-sm text-outline mt-stack-md">
                    Ao se cadastrar, você concorda com nossos <a class="text-primary hover:underline" href="#">Termos</a> e <a class="text-primary hover:underline" href="#">Privacidade</a>.
                </p>
            </div>
        
            <!-- LOGIN FLOW -->
            <div *ngIf="currentFlow === 'login'" class="absolute w-full top-0 fade-in">
                <h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-inverse-surface mb-stack-lg text-center">Bem-vindo de Volta</h2>
                <form [formGroup]="loginForm" class="flex flex-col gap-stack-md" (ngSubmit)="onLogin()">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                        <input formControlName="email" class="input-inset w-full rounded-lg py-3 pl-12 pr-4 text-on-surface outline-none placeholder:text-outline-variant font-body-md text-body-md" 
                               [class.border-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                               placeholder="Seu E-mail" type="email"/>
                    </div>
                    <div>
                        <div class="relative mb-2">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
                            <input formControlName="password" class="input-inset w-full rounded-lg py-3 pl-12 pr-4 text-on-surface outline-none placeholder:text-outline-variant font-body-md text-body-md" 
                                   [class.border-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                                   placeholder="Senha" type="password"/>
                        </div>
                        <div class="flex justify-end">
                            <a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Esqueceu a senha?</a>
                        </div>
                    </div>
                    <button [disabled]="loginForm.invalid || isLoading" class="glow-button mt-stack-sm w-full bg-primary text-on-primary-fixed font-label-md text-label-md py-4 rounded-full flex justify-center items-center gap-2 hover:bg-primary-fixed disabled:opacity-50 transition-all" type="submit">
                        <span *ngIf="!isLoading">Entrar na Conta</span>
                        <span *ngIf="isLoading" class="material-symbols-outlined animate-spin">progress_activity</span>
                        <span *ngIf="!isLoading" class="material-symbols-outlined text-sm">login</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>
